name: Run tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-action:
    name: GitHub Actions Test ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: With Version
            id: with-version
          - name: ''

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Local Action
        if: matrix.id != 'with-version'
        uses: ./

      - name: Test Local Action With Version
        if: matrix.id == 'with-version'
        uses: ./
        with:
          version: 2.9.2

      - name: Test nFPM executable
        run: |
          nfpm --version
